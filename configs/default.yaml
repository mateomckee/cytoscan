#REQUIRED configuration. researcher provided constants required for pipeline to function
research:
  pixel_size_um: 2.119
  cell_diameter_um: 10
  channel_width_um: 600
  left_fluid: "dex" #or "outer fluid" in other words

#OPTIONAL configuration. recommended default set by developer for best baseline results
#setup config.yaml to go down in the order of pipeline events
preprocessing:
  expected_channel_width_um: 600.0
  snr_threshold: 4.0

cell_detection:
  threshold: 100            # 0–255 intensity for binary mask of fluorescent frame

channel_detection:
  channel_wall_degree: 2
  channel_wall_base_inset: 15
  channel_wall_max_inset_fraction: 0.2

  channel_width_search_tolerance: 0.20
  wall_parallelism_search_fraction: 0.05

  channel_interface_smoothing_factor: 100.0
  interface_ridge_sigma_px: 2.0
  interface_dp_jump_penalty: 1.0
  interface_dp_max_jump_px: 3

flagging:
  wall_anchor_strength_min: 1.8
  interface_signal_ratio_min: 3.0
  interface_residual_mad_max_px: 4.0

analysis:
  interface_band_um: 1.0      # |distance| ≤ this → "int"
  transition_band_um: 50.0    # interface_band_um < |distance| ≤ this → "int_peg" / "int_dex"
  interface_sample_step_px: 10    # y-step for sampling the interface in interface.csv

export_visuals:
  enabled: "true"
  clear_existing: "true"
  overwrite_existing: "true"
  exported_frame : "brightfield"       # "brightfield" | "fluorescent" | "mixed"

  #toggles specific visuals
  cells: "true"
  channel_walls: "true"
  channel_walls_inset: "true"
  channel_interface: "true"
  
export_data:
  enabled: "true" 
